<!DOCTYPE html>
<html lang="en" style="background: #1b1c1e; margin: 0; padding: 0;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#1b1c1e">
    <title>Call Ended - Très³</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1b1c1e;
            color: #F4F4F5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .card {
            background: rgba(126, 129, 131, 0.1);
            padding: 64px 40px;
            border-radius: 24px;
            animation: fadeIn 0.5s ease 0.3s both;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: fadeIn 0.5s ease 0.1s both;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #6B7FB8, #7589C4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeIn 0.5s ease 0.2s both;
        }
        p {
            font-size: 18px;
            color: #A0A2A6;
            line-height: 1.6;
            animation: fadeIn 0.5s ease 0.3s both;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">👋</div>
            <h1>Call Ended</h1>
            <p>You can now close this window</p>
        </div>
    </div>
</body>
</html>
