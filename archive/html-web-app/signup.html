<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1b1c1e">
    <title>Create Account - 3V Call</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1b1c1e;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: white;
        }
        
        .header {
            padding: 20px;
            text-align: center;
            padding-top: 40px;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
            object-fit: contain;
        }
        
        .app-name {
            font-size: 26px;
            font-weight: 700;
            color: #6B7FB8;
            margin-bottom: 8px;
        }
        
        .tagline {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .content {
            flex: 1;
            padding: 30px 20px;
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
            overflow-y: auto;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
        }
        
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #6B7FB8;
            background: rgba(255, 255, 255, 0.1);
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: #6B7FB8;
            color: white;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        
        .btn-primary:hover {
            background: #5A6EA7;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(107, 127, 184, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .footer {
            text-align: center;
            padding: 20px;
        }
        
        .footer a {
            color: #6B7FB8;
            text-decoration: none;
            font-weight: 500;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .error, .success {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }
        
        .success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }
        
        .error.show, .success.show {
            display: block;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }
        
        .strength-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 2px;
        }
        
        .strength-weak { background: #ef4444; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #22c55e; width: 100%; }
    </style>
</head>
<body>
    <div class="header">
        <img src="/splash-logo.png" alt="3V Logo" class="logo">
        <h1 class="app-name">Create Account</h1>
        <p class="tagline">Join 3V for crystal clear video calls</p>
    </div>

    <div class="content">
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <form id="signupForm">
            <div class="form-group">
                <label for="displayName">Full Name</label>
                <input type="text" id="displayName" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 6 characters" required autocomplete="new-password">
                <div class="password-strength">
                    <div class="strength-bar">
                        <div id="strengthFill" class="strength-fill"></div>
                    </div>
                    <span id="strengthText"></span>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter password" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn btn-primary" id="signupBtn">
                <span>Create Account</span>
            </button>
        </form>
    </div>

    <div class="footer">
        <p>Already have an account? <a href="/signin.html">Sign In</a></p>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyB3nvi5P3PZYDfqJxaZjnD-TMTkEKNk7qc",
            authDomain: "v-b93ec.firebaseapp.com",
            projectId: "v-b93ec",
            storageBucket: "v-b93ec.firebasestorage.app",
            messagingSenderId: "685746265293",
            appId: "1:685746265293:web:4982d354fd80be0d35eb9c",
            measurementId: "G-6R4XTCCZK4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const signupForm = document.getElementById('signupForm');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const signupBtn = document.getElementById('signupBtn');
        const passwordInput = document.getElementById('password');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            successDiv.classList.remove('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.classList.add('show');
            errorDiv.classList.remove('show');
        }

        passwordInput.addEventListener('input', (e) => {
            const password = e.target.value;
            let strength = 0;
            
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            strengthFill.className = 'strength-fill';
            if (strength <= 2) {
                strengthFill.classList.add('strength-weak');
                strengthText.textContent = 'Weak password';
                strengthText.style.color = '#ef4444';
            } else if (strength <= 3) {
                strengthFill.classList.add('strength-medium');
                strengthText.textContent = 'Medium strength';
                strengthText.style.color = '#f59e0b';
            } else {
                strengthFill.classList.add('strength-strong');
                strengthText.textContent = 'Strong password';
                strengthText.style.color = '#22c55e';
            }
        });

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const displayName = document.getElementById('displayName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }

            signupBtn.disabled = true;
            signupBtn.innerHTML = '<span>Creating account...</span>';

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName });
                
                // Create user document in Firestore
                await setDoc(doc(db, 'users', userCredential.user.uid), {
                    uid: userCredential.user.uid,
                    displayName: displayName,
                    email: email,
                    createdAt: new Date().toISOString()
                });
                
                showSuccess('Account created successfully! Redirecting...');
                setTimeout(() => {
                    window.location.href = '/home.html';
                }, 1500);
            } catch (error) {
                console.error('Sign up error:', error);
                let message = 'Failed to create account. Please try again.';
                if (error.code === 'auth/email-already-in-use') {
                    message = 'This email is already registered.';
                } else if (error.code === 'auth/invalid-email') {
                    message = 'Invalid email address.';
                } else if (error.code === 'auth/weak-password') {
                    message = 'Password is too weak. Use at least 6 characters.';
                }
                showError(message);
                signupBtn.disabled = false;
                signupBtn.innerHTML = '<span>Create Account</span>';
            }
        });
    </script>
</body>
</html>
