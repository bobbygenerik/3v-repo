<!DOCTYPE html>
<html lang="en" style="background-color: #1b1c1e; margin: 0; padding: 0;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#1b1c1e">
    <title>Très³ Video Call</title>
    
    <!-- Use ES module format with import map -->
    <script type="importmap">
    {
        "imports": {
            "livekit-client": "https://cdn.jsdelivr.net/npm/livekit-client@2.5.5/+esm"
        }
    }
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            background: #1b1c1e; /* BackgroundDark - app color */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1b1c1e; /* BackgroundDark - app color */
            color: #F4F4F5;
            overflow: hidden;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: #1b1c1e; /* BackgroundDark - app color */
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .logo-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            z-index: 2;
        }
        .spinner {
            position: absolute;
            top: 0;
            left: 0;
            width: 120px;
            height: 120px;
            border: 4px solid rgba(107, 127, 184, 0.2);
            border-top: 4px solid #7589C4; /* AccentBlue */
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            box-shadow: 0 4px 16px rgba(107, 127, 184, 0.3);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: #F4F4F5; /* TextWhite - more visible */
            font-size: 16px;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        #video-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            position: relative;
            background: #1b1c1e;
        }
        .video-track {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2F3448;
            overflow: hidden;
        }
        .video-track.main {
            z-index: 1;
            display: block;
        }
        .video-track.pip {
            position: absolute;
            border-radius: 16px;
            border: 2px solid #515664;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 300; /* Higher than everything else */
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            pointer-events: auto;
            background: transparent;
            overflow: hidden;
        }
        .video-track.pip:hover {
            transform: scale(1.05);
            border-color: #6B7FB8;
        }
        .video-track.pip:active {
            transform: scale(0.95);
        }
        .video-track video {
            width: 100%;
            height: 100%;
            display: block;
            background: transparent;
        }
        
        /* Desktop and Mobile: consistent object-fit for proper aspect ratio */
        .video-track.main video {
            object-fit: contain; /* Show full video without distortion */
            object-position: center;
            background: #1b1c1e; /* Fill letterbox bars with background color */
        }
        
        .video-track.pip video {
            object-fit: cover; /* Crop to fill small PIP window */
            object-position: center;
        }
        
        /* Desktop: PIP positioning */
        @media (min-width: 769px) {
            .video-track.pip {
                width: 240px;
                height: 320px;
                top: 20px;
                right: 20px;
                cursor: move;
            }
            .video-track.pip:hover {
                border-color: #7589C4;
                box-shadow: 0 8px 32px rgba(107, 127, 184, 0.6);
            }
        }
        
        /* Mobile: cover for full-screen experience */
        @media (max-width: 768px) {
            .video-track.main video {
                object-fit: contain; /* Prevent distortion in landscape */
                background: #1b1c1e;
            }
            .video-track.pip {
                width: 100px; /* Slightly larger for easier interaction */
                height: 133px; /* Maintain 3:4 aspect ratio */
                top: 20px; /* Top-right corner on mobile */
                right: 10px;
                bottom: auto; /* Override bottom positioning */
                z-index: 300; /* Above everything */
                pointer-events: auto;
                touch-action: none; /* Prevent browser gestures */
            }
        }
        
        .participant-name {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #F4F4F5;
            font-size: 16px;
            font-weight: 600;
            z-index: 10;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            padding: 0;
        }
        
        /* Hide name on local video (PIP) */
        .video-track.pip .participant-name {
            display: none;
        }
        
        /* Consistent styling for both mobile and desktop */
        @media (max-width: 768px) {
            .video-track.main .participant-name {
                font-size: 15px;
                top: 15px;
                left: 15px;
            }
        }
        
        /* Call timer */
        .call-timer {
            position: fixed;
            top: 38px;
            left: 15px;
            color: #F4F4F5;
            font-size: 12px;
            font-weight: 500;
            z-index: 100;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            display: none;
            background: none;
            border: none;
            padding: 0;
        }
        
        .call-timer.visible {
            display: block;
        }
        .quality-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .quality-dot.excellent {
            background: #22C55E;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
        }
        .quality-dot.good {
            background: #EAB308;
            box-shadow: 0 0 8px rgba(234, 179, 8, 0.6);
        }
        .quality-dot.poor {
            background: #EF4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
        }
        
        /* Call Quality Overlay */
        .quality-overlay {
            position: fixed;
            top: 70px;
            left: 15px;
            background: rgba(27, 28, 30, 0.85);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(107, 127, 184, 0.2);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 180px;
        }
        .quality-overlay.visible {
            opacity: 1;
        }
        .quality-overlay-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .quality-overlay-label {
            color: #A0A2A6;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-width: 65px;
        }
        .quality-overlay-value {
            color: #F4F4F5;
            font-size: 12px;
            font-weight: 600;
        }
        .quality-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(107, 127, 184, 0.2);
            margin-bottom: 2px;
        }
        .quality-status-text {
            color: #F4F4F5;
            font-size: 13px;
            font-weight: 600;
        }
        
        /* Ultra Quality Toggle */
        .ultra-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(47, 52, 72, 0.95);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(107, 127, 184, 0.3);
            z-index: 350;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .ultra-toggle:hover {
            background: rgba(117, 137, 196, 0.6);
            border-color: #7589C4;
        }
        .ultra-toggle.active {
            background: rgba(34, 197, 94, 0.9);
            border-color: #22c55e;
            box-shadow: 0 0 16px rgba(34, 197, 94, 0.6);
        }
        .ultra-toggle.active:hover {
            background: rgba(34, 197, 94, 1);
            border-color: #16a34a;
        }
        .ultra-toggle-label {
            font-size: 12px;
            font-weight: 600;
            color: #F4F4F5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .ultra-toggle-icon {
            width: 16px;
            height: 16px;
        }
        @media (max-width: 768px) {
            .ultra-toggle {
                top: 20px;
                right: 120px;
                padding: 6px 12px;
            }
            .ultra-toggle-label {
                font-size: 11px;
            }
        }
        
        .no-video-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #6B7FB8 0%, #7589C4 100%);
            animation: gradientShift 10s ease infinite;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .no-video-placeholder .initial {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
                .controls {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 100;
            transition: opacity 0.3s ease;
        }
        .controls.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(81, 86, 100, 0.3); /* AppColors.Gray with alpha */
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }
        .controls:not(.hidden) .control-btn:nth-child(1) {
            animation: slideUp 0.3s ease forwards;
        }
        .controls:not(.hidden) .control-btn:nth-child(2) {
            animation: slideUp 0.3s ease 0.05s forwards;
        }
        .controls:not(.hidden) .control-btn:nth-child(3) {
            animation: slideUp 0.3s ease 0.1s forwards;
        }
        .controls:not(.hidden) .control-btn:nth-child(4) {
            animation: slideUp 0.3s ease 0.15s forwards;
        }
        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .control-btn:active {
            transform: scale(0.95);
        }
        .control-btn svg {
            width: 32px;
            height: 32px;
        }
        .control-btn.end {
            width: 88px;
            height: 88px;
            background: #E53935; /* Red for end call */
        }
        .control-btn.end svg {
            width: 40px;
            height: 40px;
        }
        .control-btn.muted {
            background: #E53935; /* Red when muted */
        }
        
        /* Desktop: app-sized buttons with hover effects */
        @media (min-width: 769px) {
            .controls {
                bottom: 40px;
            }
            .control-btn {
                width: 60px;
                height: 60px;
                background: rgba(107, 127, 184, 0.4); /* More visible app purple/blue */
                backdrop-filter: blur(10px);
            }
            .control-btn:hover {
                transform: scale(1.05);
                background: rgba(117, 137, 196, 0.6); /* AccentBlue on hover */
            }
            .control-btn.end {
                width: 75px;
                height: 75px;
                background: #E53935;
            }
            .control-btn.end:hover {
                background: #C62828;
            }
            .control-btn.muted:hover {
                background: #C62828;
            }
            .control-btn svg {
                width: 28px;
                height: 28px;
            }
            .control-btn.end svg {
                width: 36px;
                height: 36px;
            }
        }
        
        /* Mobile: app-sized buttons (matching InCallActivity) */
        @media (max-width: 768px) {
            .controls {
                gap: 24px;
                bottom: 40px;
            }
            .control-btn {
                width: 70px;
                height: 70px;
                background: rgba(107, 127, 184, 0.5);
                backdrop-filter: blur(10px);
            }
            .control-btn svg {
                width: 32px;
                height: 32px;
            }
            .control-btn.end {
                width: 88px;
                height: 88px;
                background: #E53935;
            }
            .control-btn.end svg {
                width: 40px;
                height: 40px;
            }
            /* Hide PIP button on mobile */
            #pip-btn {
                display: none;
            }
        }
        
        /* Call Menu Popup */
        .call-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 400;
            align-items: center;
            justify-content: center;
        }
        .call-menu-overlay.active {
            display: flex;
        }
        .call-menu {
            background: rgba(47, 52, 72, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 24px;
            min-width: 320px;
            max-width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(107, 127, 184, 0.3);
        }
        .call-menu-header {
            font-size: 18px;
            font-weight: 600;
            color: #F4F4F5;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(107, 127, 184, 0.3);
        }
        .call-menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 8px;
        }
        .call-menu-item:hover {
            background: rgba(107, 127, 184, 0.3);
        }
        .call-menu-item-label {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #F4F4F5;
            font-size: 15px;
        }
        .call-menu-item-label svg {
            width: 24px;
            height: 24px;
            fill: #7589C4;
        }
        .toggle-switch {
            width: 48px;
            height: 28px;
            background: rgba(107, 127, 184, 0.3);
            border-radius: 14px;
            position: relative;
            transition: background 0.3s;
            cursor: pointer;
        }
        .toggle-switch.active {
            background: #22c55e;
        }
        .toggle-switch-knob {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 12px;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }
        .toggle-switch.active .toggle-switch-knob {
            left: 22px;
        }
        .participant-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .participant-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: rgba(107, 127, 184, 0.2);
        }
        .participant-avatar {
            width: 36px;
            height: 36px;
            border-radius: 18px;
            background: linear-gradient(135deg, #6B7FB8 0%, #7589C4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }
        .participant-name {
            color: #F4F4F5;
            font-size: 14px;
            flex: 1;
        }
        .menu-close-btn {
            width: 100%;
            padding: 12px;
            background: rgba(107, 127, 184, 0.3);
            border: none;
            border-radius: 8px;
            color: #F4F4F5;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: background 0.2s;
        }
        .menu-close-btn:hover {
            background: rgba(107, 127, 184, 0.5);
        }
        
        .error-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(239, 68, 68, 0.95);
            backdrop-filter: blur(20px);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid rgba(220, 38, 38, 0.5);
            font-weight: 500;
            z-index: 200;
            animation: slideDown 0.3s ease;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
        }
        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        
        /* Connection quality indicator - part of controls, bottom left */
        .quality-indicator {
            display: none; /* Hidden - now shown inline with name */
        }
        
        /* Reconnection overlay */
        .reconnecting-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        .reconnecting-content {
            background: rgba(47, 52, 72, 0.95);
            padding: 40px 50px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(107, 127, 184, 0.5);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .reconnecting-spinner {
            border: 4px solid rgba(107, 127, 184, 0.3);
            border-top: 4px solid #7589C4;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        .reconnecting-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .reconnecting-subtext {
            font-size: 14px;
            color: #A0A2A6;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body style="background-color: #1b1c1e; margin: 0; padding: 0; overflow: hidden;">
    <div id="loading" style="background-color: #1b1c1e;">
        <div class="logo-container">
            <img src="/logo.png" alt="Très³" class="logo">
            <div class="spinner"></div>
        </div>
        <p class="loading-text">Connecting to call...</p>
    </div>

    <!-- Connection quality indicator -->
    <div class="quality-indicator" id="quality-indicator" style="display: none;">
        <span id="quality-dots">🟢🟢🟢</span>
        <span id="quality-text">Excellent</span>
    </div>
    
    <!-- Call timer -->
    <div class="call-timer" id="call-timer">00:00</div>
    
    <!-- Call Quality Overlay -->
    <div class="quality-overlay" id="quality-overlay">
        <div class="quality-status">
            <div class="quality-dot excellent" id="quality-overlay-dot"></div>
            <span class="quality-status-text" id="quality-overlay-status">Excellent</span>
        </div>
        <div class="quality-overlay-row">
            <span class="quality-overlay-label">Resolution</span>
            <span class="quality-overlay-value" id="quality-resolution">720p</span>
        </div>
        <div class="quality-overlay-row">
            <span class="quality-overlay-label">Frame Rate</span>
            <span class="quality-overlay-value" id="quality-fps">30 fps</span>
        </div>
        <div class="quality-overlay-row">
            <span class="quality-overlay-label">Bitrate</span>
            <span class="quality-overlay-value" id="quality-bitrate">1.5 Mbps</span>
        </div>
        <div class="quality-overlay-row">
            <span class="quality-overlay-label">Latency</span>
            <span class="quality-overlay-value" id="quality-latency">-- ms</span>
        </div>
    </div>
    
    <!-- Ultra Quality Toggle - REMOVED (now in menu) -->

    <div id="video-container" style="display: none;"></div>
    
    <!-- Call Menu Overlay -->
    <div class="call-menu-overlay" id="call-menu-overlay">
        <div class="call-menu">
            <div class="call-menu-header">Call Options</div>
            
            <!-- Participants Section -->
            <div class="call-menu-item" style="cursor: default; margin-bottom: 4px;">
                <div class="call-menu-item-label">
                    <svg viewBox="0 0 24 24">
                        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                    </svg>
                    <span>Participants</span>
                </div>
            </div>
            <div class="participant-list" id="participant-list">
                <!-- Participants will be added here dynamically -->
            </div>
            
            <!-- Call Health Overlay Toggle (All Users) -->
            <div class="call-menu-item" id="quality-overlay-toggle-item">
                <div class="call-menu-item-label">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                    <span>Call Health Overlay</span>
                </div>
                <div class="toggle-switch" id="quality-overlay-toggle">
                    <div class="toggle-switch-knob"></div>
                </div>
            </div>
            
            <!-- Ultra Quality Toggle (Android App Only) -->
            <div class="call-menu-item" id="ultra-toggle-item" style="display: none;">
                <div class="call-menu-item-label">
                    <svg viewBox="0 0 24 24">

    <script type="module">
        // Import LiveKit as ES module
        import * as LiveKitSDK from 'livekit-client';
        
        console.log('✅ LiveKit ES module imported:', LiveKitSDK);
        console.log('  Has Room:', !!LiveKitSDK.Room);
        console.log('  Has RoomEvent:', !!LiveKitSDK.RoomEvent);
        
        let room;
        let micEnabled = true;
        let callStartTime = null;
        let callTimerInterval = null;
        let ultraQualityEnabled = false;
        let screenShareTrack = null;
        let isScreenSharing = false;
        let statsUpdateInterval = null;
        let maxCameraCapability = null; // Store detected max resolution
        let qualityOverlayVisible = true; // Call health overlay visible by default
        let isAndroidApp = false; // Detect if running in Android app
        let currentStats = {
            resolution: '1080p',
            fps: 30,
            bitrate: 0,
            latency: 0
        };
        
        // Detect if running in Android app (check for injected interface or specific user agent)
        function detectAndroidApp() {
            const userAgent = navigator.userAgent.toLowerCase();
            // Check for Android WebView or specific app identifier
            isAndroidApp = (typeof Android !== 'undefined') || 
                          userAgent.includes('wv') || 
                          userAgent.includes('vchat-app');
            console.log('🤖 Running in Android app:', isAndroidApp);
            return isAndroidApp;
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            document.body.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 5000);
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '140px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.background = 'rgba(47, 52, 72, 0.95)';
            toast.style.backdropFilter = 'blur(20px)';
            toast.style.color = '#F4F4F5';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '12px';
            toast.style.border = '1px solid rgba(107, 127, 184, 0.3)';
            toast.style.fontSize = '14px';
            toast.style.fontWeight = '600';
            toast.style.zIndex = '9999';
            toast.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
            toast.style.animation = 'fadeIn 0.3s ease';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function updateParticipantList() {
            const listContainer = document.getElementById('participant-list');
            listContainer.innerHTML = '';
            
            if (!room) return;
            
            // Add local participant
            const localParticipant = room.localParticipant;
            const localItem = document.createElement('div');
            localItem.className = 'participant-item';
            localItem.innerHTML = `
                <div class="participant-avatar">${(localParticipant.name || 'You').charAt(0).toUpperCase()}</div>
                <div class="participant-name">${localParticipant.name || 'You'} (You)</div>
            `;
            listContainer.appendChild(localItem);
            
            // Add remote participants
            room.remoteParticipants.forEach((participant) => {
                const item = document.createElement('div');
                item.className = 'participant-item';
                item.innerHTML = `
                    <div class="participant-avatar">${(participant.name || participant.identity).charAt(0).toUpperCase()}</div>
                    <div class="participant-name">${participant.name || participant.identity}</div>
                `;
                listContainer.appendChild(item);
            });
            
            if (room.remoteParticipants.size === 0) {
                const emptyItem = document.createElement('div');
                emptyItem.style.padding = '12px';
                emptyItem.style.color = 'rgba(244, 244, 245, 0.6)';
                emptyItem.style.fontSize = '14px';
                emptyItem.style.textAlign = 'center';
                emptyItem.textContent = 'No other participants';
                listContainer.appendChild(emptyItem);
            }
        }
        
        function startCallTimer() {
            callStartTime = Date.now();
            const timerElement = document.getElementById('call-timer');
            if (timerElement) {
                timerElement.classList.add('visible');
            }
            
            // Update timer every second
            callTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                const formatted = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timerElement) {
                    timerElement.textContent = formatted;
                }
            }, 1000);
        }
        
        function stopCallTimer() {
            if (callTimerInterval) {
                clearInterval(callTimerInterval);
                callTimerInterval = null;
            }
            if (statsUpdateInterval) {
                clearInterval(statsUpdateInterval);
                statsUpdateInterval = null;
            }
        }
        
        // Setup visibility handling to enable PIP when user leaves
        function setupVisibilityHandling() {
            console.log('🔍 Setting up visibility handling for PIP mode');
            
            // Handle visibility change (tab switch, minimize, etc.)
            document.addEventListener('visibilitychange', async () => {
                if (document.hidden) {
                    console.log('📱 Page hidden - attempting to enter PIP mode');
                    await enterPIPMode();
                } else {
                    console.log('👁️ Page visible - exiting PIP mode');
                    await exitPIPMode();
                }
            });
            
            // Handle page unload/close - try to keep connection alive
            window.addEventListener('beforeunload', (e) => {
                if (room && room.state === 'connected') {
                    console.log('⚠️ Page closing - attempting PIP mode');
                    // Don't disconnect, try to enter PIP
                    enterPIPMode();
                }
            });
            
            // Handle pagehide (mobile browsers)
            window.addEventListener('pagehide', async (e) => {
                if (room && room.state === 'connected') {
                    console.log('📱 Page hiding (mobile) - entering PIP mode');
                    await enterPIPMode();
                }
            });
        }
        
        async function enterPIPMode() {
            try {
                // Get the main video element
                const mainVideo = document.querySelector('.video-track.main video');
                
                if (!mainVideo) {
                    console.log('❌ No video element found for PIP');
                    return;
                }
                
                // Check if PIP is supported
                if (!document.pictureInPictureEnabled) {
                    console.log('ℹ️ PIP not supported in this browser');
                    // On mobile, just keep connection alive
                    if (room && room.state === 'connected') {
                        console.log('✅ Keeping connection alive in background');
                    }
                    return;
                }
                
                // Enter PIP mode
                if (mainVideo !== document.pictureInPictureElement) {
                    await mainVideo.requestPictureInPicture();
                    console.log('✅ Entered PIP mode successfully');
                    showToast('📺 Picture-in-Picture mode active');
                }
            } catch (error) {
                console.warn('⚠️ Failed to enter PIP mode:', error);
                // Keep connection alive anyway
                if (room && room.state === 'connected') {
                    console.log('✅ Keeping connection alive without PIP');
                }
            }
        }
        
        async function exitPIPMode() {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                    console.log('✅ Exited PIP mode');
                }
            } catch (error) {
                console.warn('⚠️ Failed to exit PIP mode:', error);
            }
        }

        async function detectCameraCapabilities() {
            console.log('📷 Detecting camera capabilities...');
            try {
                // Get available video devices
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                console.log('  - Found', videoDevices.length, 'camera(s)');
                
                // Test different resolutions to see what's supported
                const resolutionsToTest = [
                    { name: '4K', width: 3840, height: 2160 },
                    { name: '1440p', width: 2560, height: 1440 },
                    { name: '1080p', width: 1920, height: 1080 },
                    { name: '720p', width: 1280, height: 720 },
                    { name: '540p', width: 960, height: 540 },
                    { name: '360p', width: 640, height: 360 }
                ];
                
                const supportedResolutions = [];
                
                for (const res of resolutionsToTest) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({
                            video: {
                                width: { ideal: res.width },
                                height: { ideal: res.height },
                                frameRate: { ideal: 30 }
                            }
                        });
                        
                        const track = stream.getVideoTracks()[0];
                        const settings = track.getSettings();
                        const capabilities = track.getCapabilities ? track.getCapabilities() : null;
                        
                        supportedResolutions.push({
                            name: res.name,
                            width: settings.width,
                            height: settings.height,
                            maxFrameRate: capabilities?.frameRate?.max || 30
                        });
                        
                        console.log(`  ✅ ${res.name}: ${settings.width}×${settings.height} @ ${capabilities?.frameRate?.max || 30}fps`);
                        
                        // Stop the test stream
                        track.stop();
                        
                        // If we got the exact resolution we wanted, we can be confident it's supported
                        if (settings.width === res.width && settings.height === res.height) {
                            break; // Found max, no need to test lower
                        }
                    } catch (e) {
                        console.log(`  ❌ ${res.name}: Not supported`);
                    }
                }
                
                if (supportedResolutions.length > 0) {
                    const maxRes = supportedResolutions[0];
                    console.log(`📷 Maximum supported resolution: ${maxRes.name} (${maxRes.width}×${maxRes.height}) @ ${maxRes.maxFrameRate}fps`);
                    showToast(`📷 Camera: ${maxRes.name} @ ${maxRes.maxFrameRate}fps`);
                    return maxRes;
                } else {
                    console.log('⚠️ Could not detect camera capabilities');
                    return null;
                }
            } catch (error) {
                console.error('❌ Error detecting camera capabilities:', error);
                return null;
            }
        }

        async function joinCall() {
            console.log('🚀 Starting joinCall...');
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const wsUrl = urlParams.get('url');

            console.log('Token present:', !!token, 'length:', token?.length);
            console.log('WebSocket URL:', wsUrl);

            if (!token || !wsUrl) {
                const error = 'Invalid call link. Missing ' + (!token ? 'token' : 'URL');
                console.error('❌', error);
                showError(error);
                document.getElementById('loading').innerHTML = '<p>❌ Invalid call link</p><p style="font-size:12px;margin-top:10px;">Please check the link and try again.</p>';
                return;
            }

            try {
                // Detect if running in Android app
                detectAndroidApp();
                
                // Show Ultra toggle only for Android app users
                if (isAndroidApp) {
                    document.getElementById('ultra-toggle-item').style.display = 'flex';
                } else {
                    // Show Add Person button only for browser users
                    document.getElementById('add-person-btn').style.display = 'flex';
                }
                
                // Setup visibility change handler for PIP mode
                setupVisibilityHandling();
                
                // Detect camera capabilities first
                maxCameraCapability = await detectCameraCapabilities();
                
                // ES module is already loaded at this point
                console.log('✅ Using LiveKit ES module');
                console.log('🏗️ Creating room...');
                
                // Determine initial video settings with bandwidth optimization
                let initialResolution, initialFrameRate, targetBitrate, videoCodec;
                if (ultraQualityEnabled) {
                    // Ultra mode: 4K @ 30fps (Android app only)
                    initialResolution = { width: 3840, height: 2160 };
                    initialFrameRate = 30;
                    targetBitrate = 8000000; // 8 Mbps for 4K
                    // Codec priority for Ultra: H.265 > VP9 > H.264 > VP8
                    videoCodec = 'h265'; // Try H.265 first for best compression
                    console.log(`📹 Ultra mode: Using 4K @ 30fps with H.265 (fallback chain)`);
                } else {
                    // Standard mode: 1080p @ 30fps (default for all - Apple limit)
                    initialResolution = { width: 1920, height: 1080 };
                    initialFrameRate = 30;
                    targetBitrate = 3000000; // 3 Mbps for 1080p
                    // Codec priority: H.265 > VP9 > H.264 > VP8
                    videoCodec = 'h265'; // LiveKit will auto-fallback if not supported
                    console.log(`📹 Standard mode: Using 1080p @ 30fps with H.265 (fallback chain)`);
                }
                
                room = new LiveKitSDK.Room({
                    adaptiveStream: true,
                    dynacast: true,
                    videoCaptureDefaults: {
                        resolution: initialResolution,
                        frameRate: initialFrameRate,
                        // Option 4: Hardware acceleration hints
                        contentHint: isAndroidApp ? 'motion' : undefined
                    },
                    publishDefaults: {
                        simulcast: true,
                        // Option 8: Chromium optimization for Android
                        scalabilityMode: isAndroidApp ? 'L3T3_KEY' : 'L3T3',
                        // Codec with fallback chain: h265 -> vp9 -> h264 -> vp8
                        videoCodec: videoCodec,
                        videoCodecPref: ['h265', 'vp9', 'h264', 'vp8'], // Fallback order
                        // Option 2: Explicit bitrate targets
                        videoBitrate: targetBitrate,
                        // Option 6: Forward Error Correction for packet loss
                        red: true,
                        dtx: false
                    },
                    audioCaptureDefaults: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        // Option 5: High quality audio
                        sampleRate: 48000,
                        channelCount: 2
                    }
                });

                console.log('📡 Setting up event listeners...');
                room.on(LiveKitSDK.RoomEvent.TrackSubscribed, handleTrackSubscribed);
                room.on(LiveKitSDK.RoomEvent.TrackUnsubscribed, handleTrackUnsubscribed);
                room.on(LiveKitSDK.RoomEvent.Disconnected, handleDisconnect);
                room.on(LiveKitSDK.RoomEvent.ParticipantDisconnected, handleParticipantDisconnected);
                room.on(LiveKitSDK.RoomEvent.ParticipantConnected, handleParticipantConnected);
                
                // Option 3: Dynamic bitrate adjustment based on connection quality
                room.on(LiveKitSDK.RoomEvent.ConnectionQualityChanged, handleConnectionQualityWithAdjustment);
                
                // Reconnection logic
                room.on(LiveKitSDK.RoomEvent.Reconnecting, handleReconnecting);
                room.on(LiveKitSDK.RoomEvent.Reconnected, handleReconnected);
                room.on(LiveKitSDK.RoomEvent.ConnectionStateChanged, handleConnectionStateChanged);

                console.log('🔌 Connecting to room...');
                console.log('  URL:', wsUrl);
                console.log('  Token (first 20 chars):', token.substring(0, 20) + '...');
                
                await room.connect(wsUrl, token);
                console.log('✅ Connected to room:', room.name);
                console.log('  - Room SID:', room.sid);
                console.log('  - Local participant:', room.localParticipant.identity);
                console.log('  - Local participant SID:', room.localParticipant.sid);
                console.log('  - Existing participants:', room.remoteParticipants.size);
                
                // Log existing participants
                room.remoteParticipants.forEach((participant, sid) => {
                    console.log('  - Remote participant:', participant.identity, 'SID:', sid);
                    console.log('    - Video tracks:', participant.videoTrackPublications.size);
                    console.log('    - Audio tracks:', participant.audioTrackPublications.size);
                });

                console.log('🎥 Enabling camera and microphone...');
                try {
                    // CRITICAL FIX: Enable camera and mic separately with proper error handling
                    // and ensure both are published to the room
                    console.log('  - Creating audio and video tracks...');
                    
                    // Use stable resolutions
                    let videoResolution, videoFrameRate;
                    if (ultraQualityEnabled) {
                        videoResolution = { width: 3840, height: 2160 };
                        videoFrameRate = 30;
                        console.log('  - Ultra mode: Using 4K @ 30fps');
                    } else {
                        videoResolution = { width: 1920, height: 1080 };
                        videoFrameRate = 30;
                        console.log('  - Standard mode: Using 1080p @ 30fps');
                    }
                    
                    const tracks = await room.localParticipant.createTracks({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        },
                        video: {
                            resolution: videoResolution,
                            frameRate: videoFrameRate
                        }
                    });
                    
                    console.log('  - Tracks created:', tracks.length);
                    
                    // Publish each track explicitly
                    for (const track of tracks) {
                        console.log('  - Publishing', track.kind, 'track...');
                        const publication = await room.localParticipant.publishTrack(track, {
                            simulcast: true,
                            videoCodec: 'vp8'
                        });
                        console.log('    ✅ Published successfully');
                        console.log('    - Publication sid:', publication.trackSid);
                        console.log('    - Track sid:', track.sid);
                        console.log('    - Source:', publication.source);
                        console.log('    - Track enabled:', track.enabled);
                    }
                    
                    console.log('✅ All tracks published successfully');
                    
                    // Verify tracks are enabled
                    const videoTrack = Array.from(room.localParticipant.videoTrackPublications.values())
                        .find(pub => pub.source === LiveKitSDK.Track.Source.Camera);
                    const audioTrack = Array.from(room.localParticipant.audioTrackPublications.values())
                        .find(pub => pub.source === LiveKitSDK.Track.Source.Microphone);
                    
                    console.log('  - Video track enabled:', videoTrack?.track?.enabled);
                    console.log('  - Audio track enabled:', audioTrack?.track?.enabled);
                    
                } catch (mediaError) {
                    console.warn('⚠️ Media error:', mediaError);
                    // Try fallback: enable separately
                    try {
                        await room.localParticipant.setMicrophoneEnabled(true);
                        console.log('✅ Mic enabled (fallback)');
                    } catch (e) {
                        console.error('Mic failed:', e);
                    }
                    try {
                        await room.localParticipant.setCameraEnabled(true);
                        console.log('✅ Camera enabled (fallback)');
                    } catch (e) {
                        console.error('Camera failed:', e);
                    }
                }

                // Attempt to start audio playback (may require user gesture on some browsers)
                try {
                    await room.startAudio();
                    console.log('🔊 Audio playback started automatically');
                } catch (e) {
                    console.warn('🔇 Autoplay blocked, attempting to start anyway:', e);
                    // Try again after a short delay
                    setTimeout(async () => {
                        try {
                            await room.startAudio();
                            console.log('🔊 Audio started on retry');
                        } catch (retryError) {
                            console.warn('Audio autoplay still blocked:', retryError);
                        }
                    }, 500);
                }
                
                // Show UI
                document.getElementById('loading').style.display = 'none';
                document.getElementById('video-container').style.display = 'flex';
                // Ultra toggle removed from top-right, now in menu
                const controls = document.getElementById('controls');
                controls.classList.remove('hidden');
                
                // Set quality overlay toggle to active by default
                document.getElementById('quality-overlay-toggle').classList.add('active');
                
                // Display local video
                console.log('🖼️ UI displayed, showing local video...');
                displayLocalVideo();
                console.log('✅ Call setup complete!');
                console.log('═══════════════════════════════════════');
                
                // Start auto-hide timer for controls
                setTimeout(() => {
                    resetControlsHideTimer();
                }, 2000);
                
                // Start call timer
                startCallTimer();

            const videoPublication = Array.from(room.localParticipant.videoTrackPublications.values())
                .find(pub => pub.source === LiveKitSDK.Track.Source.Camera);

                }

        async function updateQualityStats() {
            if (!room || !room.localParticipant) return;
            
            try {
                // Get local video track stats
                const videoPublication = Array.from(room.localParticipant.videoTrackPublications.values())
                    .find(pub => pub.source === LiveKitSDK.Track.Source.Camera);
                
                if (videoPublication && videoPublication.track) {
                    const track = videoPublication.track;
                    
                    // Get video settings
                    const settings = track.mediaStreamTrack.getSettings();
                    const resolution = `${settings.height}p`;
                    const fps = Math.round(settings.frameRate || 30);
                    
                    // Get stats from WebRTC
                    const stats = await videoPublication.track.getRTCStatsReport();
                    let bitrate = 0;
                    let latency = 0;
                    
                    stats.forEach(report => {
                        if (report.type === 'outbound-rtp' && report.mediaType === 'video') {
                            // Calculate bitrate (bits per second to Mbps)
                            if (report.bytesSent && report.timestamp) {
                                bitrate = ((report.bytesSent * 8) / 1000000).toFixed(1);
                            }
                        }
                        if (report.type === 'candidate-pair' && report.state === 'succeeded') {
                            latency = report.currentRoundTripTime ? Math.round(report.currentRoundTripTime * 1000) : 0;
                        }
                    });
                    
                    // Update UI
                    document.getElementById('quality-resolution').textContent = resolution;
                    document.getElementById('quality-fps').textContent = `${fps} fps`;
                    document.getElementById('quality-bitrate').textContent = bitrate > 0 ? `${bitrate} Mbps` : '-- Mbps';
                    document.getElementById('quality-latency').textContent = latency > 0 ? `${latency} ms` : '-- ms';
                    
                    // Store current stats
                    currentStats = { resolution, fps, bitrate, latency };
                }
            } catch (error) {
                console.warn('Error updating quality stats:', error);
            }
        }

            try {
                // Stop call timer
                stopCallTimer();
                
                // Stop all tracks before disconnecting
                if (room && room.localParticipant) {
                    console.log('  - Stopping local tracks...');
                    
                    // Stop camera
                    const cameraTracks = room.localParticipant.videoTrackPublications;
                    cameraTracks.forEach(async (pub) => {
                        if (pub.track) {
                            pub.track.stop();
                            await room.localParticipant.unpublishTrack(pub.track);
                        }
                    });
                    
                    // Stop microphone
                    const audioTracks = room.localParticipant.audioTrackPublications;
                    audioTracks.forEach(async (pub) => {
                        if (pub.track) {
                            pub.track.stop();
                            await room.localParticipant.unpublishTrack(pub.track);
                        }
                    });
                    
                    // Stop screen share if active
                    if (screenShareTrack) {
                        screenShareTrack.stop();
                        await room.localParticipant.unpublishTrack(screenShareTrack);
                        screenShareTrack = null;
                    }
                    
                    console.log('  - All tracks stopped');

                // Disconnect from room

                    await room.disconnect();
                    console.log('  - Disconnected successfully');
                }
                
            } catch (e) {

                    container.style.right = '20px';

                    container.style.bottom = 'auto';
                    makeDraggable(container);

                    container.style.width = '100px';
                    container.style.height = '133px';
                    container.style.top = '20px';
                    container.style.right = '10px';
                    container.style.bottom = 'auto';

                    setupMobilePIPInteractions(container);

        // Mobile PIP Interaction Handler
        function setupMobilePIPInteractions(pipElement) {
            let tapCount = 0;
            let tapTimer = null;
            let longPressTimer = null;
            let isLongPress = false;
            let isDragging = false;
            let startX, startY, initialX, initialY;
            
            pipElement.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isLongPress = false;
                isDragging = false;
                
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                
                const rect = pipElement.getBoundingClientRect();
                initialX = rect.left;
                initialY = rect.top;
                
                // Start long press timer for drag mode
                longPressTimer = setTimeout(() => {
                    isLongPress = true;
                    isDragging = true;
                    pipElement.style.opacity = '0.8';
                    showToast('� Move PIP');
                }, 500); // 500ms for long press
            }, { passive: false });
            
            pipElement.addEventListener('touchmove', (e) => {
                if (!isLongPress && !isDragging) {
                    // Cancel long press if moving before it triggers
                    clearTimeout(longPressTimer);
                    return;
                }
                
                if (isDragging) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const deltaX = touch.clientX - startX;
                    const deltaY = touch.clientY - startY;
                    
                    // Update position
                    const newX = initialX + deltaX;
                    const newY = initialY + deltaY;
                    
                    // Constrain to viewport
                    const maxX = window.innerWidth - pipElement.offsetWidth;
                    const maxY = window.innerHeight - pipElement.offsetHeight;
                    
                    pipElement.style.left = Math.max(0, Math.min(newX, maxX)) + 'px';
                    pipElement.style.top = Math.max(0, Math.min(newY, maxY)) + 'px';
                    pipElement.style.right = 'auto';
                    pipElement.style.bottom = 'auto';
                }
            }, { passive: false });
            
            pipElement.addEventListener('touchend', (e) => {
                e.preventDefault();
                clearTimeout(longPressTimer);
                
                if (isDragging) {
                    // End drag mode
                    pipElement.style.opacity = '1';
                    isDragging = false;
                    isLongPress = false;
                    return;
                }
                
                if (isLongPress) {
                    // Long press without drag
                    isLongPress = false;
                    return;
                }
                
                // Handle taps
                tapCount++;
                
                if (tapCount === 1) {
                    tapTimer = setTimeout(() => {
                        if (tapCount === 1) {
                            // Single tap: do nothing now
                        }
                        tapCount = 0;
                    }, 300); // 300ms to detect double tap
                } else if (tapCount === 2) {
                    // Double tap: swap videos
                    clearTimeout(tapTimer);
                    swapVideos();
                    showToast('🔄 Videos swapped');
                    tapCount = 0;
                }
            }, { passive: false });
        }

        // Make PiP draggable on desktop
        function makeDraggable(element) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            let clickCount = 0;
            let clickTimer = null;
            
            element.onmousedown = dragMouseDown;
            
            // Add double-click to swap videos
            element.addEventListener('dblclick', (e) => {
                e.preventDefault();
                swapVideos();
                showToast('🔄 Videos swapped');
            });
            
            function dragMouseDown(e) {
                // Don't drag if clicking on video element itself (allow video interactions)
                if (e.target.tagName === 'VIDEO') return;
                
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }
            
            function elementDrag(e) {
                e.preventDefault();
                
                // Mark as dragged so layout updates don't reset position
                element.dataset.dragged = 'true';
                
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                
                // Calculate new position
                let newTop = element.offsetTop - pos2;
                let newLeft = element.offsetLeft - pos1;
                
                // Keep within viewport bounds
                const maxX = window.innerWidth - element.offsetWidth;
                const maxY = window.innerHeight - element.offsetHeight;
                
                newLeft = Math.max(0, Math.min(newLeft, maxX));
                newTop = Math.max(0, Math.min(newTop, maxY));
                
                element.style.top = newTop + "px";
                element.style.left = newLeft + "px";
                element.style.right = "auto";
            }
            
            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

            // Already loaded
            joinCall();
        }
        
        // ===== AUTO-HIDE CONTROLS (like InCallActivity) =====
        let controlsHideTimer = null;
        const CONTROLS_HIDE_DELAY = 4000; // 4 seconds, matching app
        
        function showControls() {
            const controls = document.getElementById('controls');
            if (controls) {
                controls.classList.remove('hidden');
                resetControlsHideTimer();
            }
        }
        
        function hideControls() {
            const controls = document.getElementById('controls');
            if (controls) {
                controls.classList.add('hidden');
            }
        }
        
        function resetControlsHideTimer() {
            // Clear existing timer
            if (controlsHideTimer) {
                clearTimeout(controlsHideTimer);
            }
            
            // Set new timer to hide controls
            controlsHideTimer = setTimeout(() => {
                hideControls();
            }, CONTROLS_HIDE_DELAY);
        }
        
        // Show/hide controls on tap (mobile) or click (desktop)
        document.addEventListener('click', (e) => {
            // Don't toggle if clicking on a control button
            if (!e.target.closest('.control-btn')) {
                const controls = document.getElementById('controls');
                if (controls.classList.contains('hidden')) {
                    showControls();
                }
            }
        });
        document.addEventListener('touchstart', (e) => {
            if (!e.target.closest('.control-btn')) {
                const controls = document.getElementById('controls');
                if (controls.classList.contains('hidden')) {
                    showControls();
                }
            }
        });
        
        // On desktop, show controls on mouse move
        let mouseMoveTimer;
        document.addEventListener('mousemove', () => {
            clearTimeout(mouseMoveTimer);
            mouseMoveTimer = setTimeout(() => {
                showControls();
            }, 100);
        });
    </script>
</body>
</html>
