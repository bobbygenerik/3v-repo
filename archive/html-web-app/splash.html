<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1b1c1e">
    <title>3V Call</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1b1c1e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        
        .splash-container {
            text-align: center;
            padding: 20px;
        }
        
        .splash-logo {
            width: 200px;
            height: 200px;
            margin-bottom: 30px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .app-name {
            font-size: 36px;
            font-weight: 700;
            color: #6B7FB8;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .app-tagline {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
        }
        
        .loading-indicator {
            margin-top: 40px;
        }
        
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #6B7FB8;
            animation: pulse 1.4s infinite ease-in-out;
        }
        
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes pulse {
            0%, 80%, 100% {
                transform: scale(0.6);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <img src="/splash-logo.png" alt="3V Logo" class="splash-logo">
        <h1 class="app-name">3V CALL</h1>
        <p class="app-tagline">Crystal Clear Video Calls</p>
        <div class="loading-indicator">
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <script type="module">
        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('✅ Service Worker registered', reg))
                .catch(err => console.error('❌ Service Worker registration failed', err));
        }

        // Animate logo on load
        window.addEventListener('load', () => {
            const logo = document.querySelector('.splash-logo');
            logo.style.opacity = '1';
            logo.style.transform = 'scale(1)';
            
            // Check authentication state
            setTimeout(async () => {
                try {
                    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js');
                    const { getAuth, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
                    
                    const firebaseConfig = {
                        apiKey: "AIzaSyB3nvi5P3PZYDfqJxaZjnD-TMTkEKNk7qc",
                        authDomain: "v-b93ec.firebaseapp.com",
                        projectId: "v-b93ec",
                        storageBucket: "v-b93ec.firebasestorage.app",
                        messagingSenderId: "685746265293",
                        appId: "1:685746265293:web:4982d354fd80be0d35eb9c",
                        measurementId: "G-6R4XTCCZK4"
                    };
                    
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            // User is signed in, go to home
                            window.location.href = '/home.html';
                        } else {
                            // No user, go to sign in
                            window.location.href = '/signin.html';
                        }
                    });
                } catch (error) {
                    console.error('Firebase init error:', error);
                    // Fallback to signin
                    setTimeout(() => {
                        window.location.href = '/signin.html';
                    }, 500);
                }
            }, 2000); // 2 second splash display
        });
    </script>
</body>
</html>
