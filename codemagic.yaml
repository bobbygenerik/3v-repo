workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - google_credentials
      vars:
        PACKAGE_NAME: "com.example.tres3"
      java: 17
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
          
      - name: Build Android debug APKs
        script: |
          ./gradlew assembleDebug --no-daemon
          
    artifacts:
      - app/build/outputs/**/*.apk
      
    publishing:
      email:
        recipients:
          - build@tres3.app
        notify:
          success: true
          failure: true
