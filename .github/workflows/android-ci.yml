name: Android CI (Debug APK)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: '35.0.0'
          ndk: ''
          cmake: ''

      - name: Cache Gradle
        uses: gradle/gradle-build-action@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Show Gradle and environment info
        shell: bash
        run: |
          set -euxo pipefail
          ./gradlew -v || true
          java -version || true
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "Listing build-tools..."
          ls -la "$ANDROID_HOME/build-tools" || true
          echo "sdkmanager list (first 200 lines)"
          sdkmanager --list | head -n 200 || true

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace --info

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Show debug keystore SHA-1/SHA-256 (for Firebase Phone Auth)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          KS="$HOME/.android/debug.keystore"
          echo "\nAndroid debug keystore fingerprints (CI runner):\n"
          if [ -f "$KS" ]; then
            keytool -list -v -alias androiddebugkey -keystore "$KS" -storepass android -keypass android | sed -n 's/^\(SHA1:\|SHA256:\)/\1/p'
          else
            echo "(debug.keystore not found at $KS — this is normal if assembleDebug failed earlier)" >&2
          fi
          echo "\nAdd these (SHA-1 and SHA-256) to Firebase Console → Project settings → Your apps → Android app."
