name: Android Release (Signed APK/AAB)

on:
  workflow_dispatch:
    inputs:
      buildVariant:
        description: 'Build variant to release'
        required: false
        default: 'release'
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BUILD_TOOLS: '35.0.0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: ${{ env.BUILD_TOOLS }}

      - name: Cache Gradle
        uses: gradle/gradle-build-action@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Assemble and bundle Release
        run: |
          ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon --stacktrace

      - name: Prepare signing keystore (if provided)
        id: keystore
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Keystore secret found; preparing keystore.jks"
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "No keystore secret; will upload unsigned artifacts"
            echo "present=false" >> $GITHUB_OUTPUT
          fi

      - name: Locate artifacts
        id: locate
        shell: bash
        run: |
          set -euo pipefail
          APK_UNSIGNED=$(ls app/build/outputs/apk/release/*-release*.apk 2>/dev/null | head -n1 || true)
          AAB_FILE=$(ls app/build/outputs/bundle/release/*.aab 2>/dev/null | head -n1 || true)
          echo "apk=$APK_UNSIGNED" >> $GITHUB_OUTPUT
          echo "aab=$AAB_FILE" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_UNSIGNED"
          echo "Found AAB: $AAB_FILE"

      - name: Sign APK (apksigner)
        id: sign-apk
        if: steps.keystore.outputs.present == 'true' && steps.locate.outputs.apk != ''
        shell: bash
        env:
          STORE_PW: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          KEY_PW: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          APK_IN="${{ steps.locate.outputs.apk }}"
          APK_OUT="${APK_IN%.apk}-signed.apk"
          "$ANDROID_HOME"/build-tools/${BUILD_TOOLS}/zipalign -f 4 "$APK_IN" aligned.apk
          "$ANDROID_HOME"/build-tools/${BUILD_TOOLS}/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:"$STORE_PW" \
            --key-pass pass:"$KEY_PW" \
            --ks-key-alias "$KEY_ALIAS" \
            --out "$APK_OUT" aligned.apk
          "$ANDROID_HOME"/build-tools/${BUILD_TOOLS}/apksigner verify --print-certs "$APK_OUT"
          echo "signed_apk=$APK_OUT" >> $GITHUB_OUTPUT

      - name: Sign AAB (jarsigner)
        id: sign-aab
        if: steps.keystore.outputs.present == 'true' && steps.locate.outputs.aab != ''
        shell: bash
        env:
          STORE_PW: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          KEY_PW: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          AAB_IN="${{ steps.locate.outputs.aab }}"
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore keystore.jks -storepass "$STORE_PW" -keypass "$KEY_PW" \
            "$AAB_IN" "$KEY_ALIAS"
          echo "signed_aab=$AAB_IN" >> $GITHUB_OUTPUT

      - name: Upload signed artifacts
        if: steps.keystore.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: |
            ${{ steps.locate.outputs.aab }}
            ${{ steps.sign-apk.outputs.signed_apk }}
          if-no-files-found: warn

      - name: Upload unsigned artifacts (fallback)
        if: steps.keystore.outputs.present != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
