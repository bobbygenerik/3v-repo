name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Large files and artifacts guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block committed APK/AAB and >50MB files
        run: |
          set -euo pipefail
          echo "Checking for committed APK/AAB..."
          if git ls-files '*.apk' '*.aab' | grep -q .; then
            echo "Error: APK/AAB files are committed. Remove them and update .gitignore."
            exit 1
          fi
          echo "Checking for large tracked files (>50MB)..."
          LARGE="$(git ls-tree -r -l HEAD | awk '$4 != "-" && $4 > 52428800 {print $4, $5}')"
          if [ -n "${LARGE:-}" ]; then
            echo "Large tracked files found (size bytes, path):"
            echo "$LARGE"
            exit 1
          fi
          echo "OK: No APK/AAB or large files committed."

  build:
    name: Build (Gradle)
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Detect compileSdk and buildTools
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          CS="$(grep -RhoE 'compileSdk\s*=?\s*[0-9]+' app build.gradle* 2>/dev/null | grep -Eo '[0-9]+' | head -n1 || true)"
          if [ -z "${CS:-}" ]; then CS=34; fi
          echo "compileSdk=$CS" >> "$GITHUB_OUTPUT"
          echo "buildTools=${CS}.0.0" >> "$GITHUB_OUTPUT"
          echo "Detected compileSdk=$CS"

      - name: Install SDK packages
        shell: bash
        run: |
          set -euo pipefail
          # Accept licenses; 'yes' can exit with SIGPIPE causing non-zero under pipefail, so tolerate it
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-${{ steps.detect.outputs.compileSdk }}" "build-tools;${{ steps.detect.outputs.buildTools }}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # Disable caching/cleanup to avoid post-step failures with older Gradle wrappers
          cache-disabled: true
          gradle-home-cache-cleanup: false

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew --no-daemon --stacktrace assembleDebug
      - name: Print APK signing certificate (SHA-256)
        shell: bash
        run: |
          set -euo pipefail
          APK_PATH=$(ls -1 app/build/outputs/apk/debug/*.apk | head -n1)
          echo "APK: $APK_PATH"
          APKSIGNER="$ANDROID_HOME/build-tools/${{ steps.detect.outputs.buildTools }}/apksigner"
          if [ -x "$APKSIGNER" ]; then
            echo "Signing cert info:" | tee -a "$GITHUB_STEP_SUMMARY"
            "$APKSIGNER" verify --print-certs "$APK_PATH" 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "apksigner not found at $APKSIGNER" | tee -a "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
