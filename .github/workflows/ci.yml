name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Large files and artifacts guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block committed APK/AAB and >50MB files
        run: |
          set -euo pipefail
          echo "Checking for committed APK/AAB..."
          if git ls-files '*.apk' '*.aab' | grep -q .; then
            echo "Error: APK/AAB files are committed. Remove them and update .gitignore."
            exit 1
          fi
          echo "Checking for large tracked files (>50MB)..."
          LARGE="$(git ls-tree -r -l HEAD | awk '$4 != "-" && $4 > 52428800 {print $4, $5}')"
          if [ -n "${LARGE:-}" ]; then
            echo "Large tracked files found (size bytes, path):"
            echo "$LARGE"
            exit 1
          fi
          echo "OK: No APK/AAB or large files committed."

  build:
    name: Build (Flutter)
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Flutter doctor
        working-directory: tres_flutter
        run: flutter doctor -v

      - name: Get dependencies
        working-directory: tres_flutter
        run: flutter pub get

      - name: Analyze
        working-directory: tres_flutter
        run: flutter analyze --no-fatal-infos

      - name: Build Android APK
        working-directory: tres_flutter
        run: flutter build apk --debug

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: tres_flutter/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn
