<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="High-quality video calling app with advanced features">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Três3">
  <link rel="apple-touch-icon" href="icons/Icon-512.png">
  <meta name="theme-color" content="#1C1C1E">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="96x96" href="favicon.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="icons/Icon-512.png"/>
  <link rel="shortcut icon" type="image/png" href="favicon.png"/>

  <title>Três3</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    /* Prevent white flash - match app background color */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #1C1C1E;
      overflow: hidden;
    }
    
    /* Loading indicator */
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(107, 127, 184, 0.2);
      border-top-color: #6B7FB8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      color: #F4F4F5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      opacity: 0.7;
    }
    
    /* reCAPTCHA container styling */
    #recaptcha-container {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }
  </style>
  
  <script>
    // Register Firebase messaging service worker for background notifications
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/firebase-messaging-sw.js')
        .then(function(registration) {
          console.log('Service Worker registered:', registration);
        })
        .catch(function(error) {
          console.log('Service Worker registration failed:', error);
        });
    }
  </script>
</head>
<body>
  <!-- Loading indicator (hidden when Flutter loads) -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading Três3...</div>
  </div>
  
  <!-- Container for reCAPTCHA widget (required for phone auth on web) -->
  <div id="recaptcha-container"></div>
  
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint().then(function(engineInitializer) {
        return engineInitializer.initializeEngine();
      }).then(function(appRunner) {
        return appRunner.runApp();
      }).then(function() {
        // Hide loading indicator when Flutter is ready
        var loading = document.getElementById('loading');
        if (loading) {
          loading.style.display = 'none';
        }
      });
    });
  </script>
</body>
</html>
