  <link rel="shortcut icon" type="image/png" href="favicon.png"/>

  <title>Três3</title>

  <style>
    /* Prevent white flash - match app background color */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #1C1C1E;
      overflow: hidden;
    }
    
    /* Loading indicator */
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(107, 127, 184, 0.2);
      border-top-color: #6B7FB8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      color: #F4F4F5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      opacity: 0.7;
    }
    
    /* reCAPTCHA container styling */
    #recaptcha-container {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }
  </style>
  
  <script>
    // Clear service worker cache and register new one
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
        }
      });
      
      navigator.serviceWorker.register('/firebase-messaging-sw.js')
        .then(function(registration) {
          console.log('Service Worker registered:', registration);
        })
        .catch(function(error) {
          console.log('Service Worker registration failed:', error);
        });
    }
  </script>

  <script type="module" src="mediapipe/mediapipe_bridge.mjs"></script>
</head>
<body>
  <!-- Loading indicator (hidden when Flutter loads) -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading Três3...</div>
  </div>
  
  <!-- Container for reCAPTCHA widget (required for phone auth on web) -->
  <div id="recaptcha-container"></div>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
  
  <script>
    // Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBKlwuvmoaZNbHADyO7INVW8FoG7YW2RoY",
      authDomain: "tres3-5fdba.firebaseapp.com",
      projectId: "tres3-5fdba",
      storageBucket: "tres3-5fdba.firebasestorage.app",
      messagingSenderId: "128602192923",
      appId: "1:128602192923:web:0d756019d8a9121fd3ccbe",
      measurementId: "G-LL6DSZ6BEM"

    firebase.initializeApp(firebaseConfig);
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Fix mobile keyboard viewport issues
    function setViewportHeight() {
      document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px');
    }
    
    setViewportHeight();
    window.addEventListener('resize', setViewportHeight);
    
    window.addEventListener('load', function(ev) {
      // Hide loading indicator when Flutter is ready
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
